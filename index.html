<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🐾 Evidence koček v Sissi</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <!-- SheetJS pro export do Excelu -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    :root {
      --bg: #fdf6ee;
      --card: #ffffff;
      --accent: #c1440e;
      --accent2: #e8a87c;
      --text: #2a1f14;
      --muted: #8a7060;
      --border: #e8ddd4;
      --available: #2d7a4f;
      --adopted: #555;
      --foster: #b06000;
      --medical: #9b2335;
      --section-bg: #f7efe6;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* ── LOGIN ── */
    #login-screen {
      display: none; flex-direction: column; align-items: center;
      justify-content: center; min-height: 100vh; padding: 30px 20px; text-align: center;
    }
    #login-screen .paw { font-size: 3.5rem; margin-bottom: 10px; }
    #login-screen h2 { font-family: 'Playfair Display', serif; font-size: 1.6rem; margin-bottom: 6px; }
    #login-screen .subtitle { color: var(--muted); margin-bottom: 28px; font-size: 0.95rem; }
    .login-box {
      width: 100%; max-width: 380px; background: white; border-radius: 20px;
      padding: 28px 24px; border: 1px solid var(--border); box-shadow: 0 4px 20px rgba(0,0,0,0.07);
    }
    .login-box input {
      width: 100%; padding: 11px 14px; border: 1.5px solid var(--border); border-radius: 10px;
      font-family: 'DM Sans', sans-serif; font-size: 0.95rem; margin-bottom: 12px;
      outline: none; color: var(--text); background: var(--bg); transition: border-color 0.2s;
    }
    .login-box input:focus { border-color: var(--accent2); }
    .login-box .btn-primary { width: 100%; margin-top: 4px; }
    #login-error { color: var(--medical); font-size: 0.85rem; margin-top: 10px; display: none; }
    #login-success { color: var(--available); font-size: 0.85rem; margin-top: 10px; display: none; }
    #forgot-link {
      display: block; margin-top: 14px; font-size: 0.85rem; color: var(--muted);
      cursor: pointer; text-decoration: underline; background: none; border: none; font-family: 'DM Sans', sans-serif;
    }
    #forgot-link:hover { color: var(--accent); }

    /* ── HEADER ── */
    header {
      background: var(--text); color: #fdf6ee; padding: 16px 20px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 12px rgba(0,0,0,0.15);
    }
    header h1 { font-family: 'Playfair Display', serif; font-size: 1.4rem; letter-spacing: 0.02em; }
    header h1 span { color: var(--accent2); }
    .header-actions { display: flex; gap: 8px; align-items: center; }
    #add-btn {
      background: var(--accent); color: white; border: none; border-radius: 50px;
      padding: 8px 16px; font-size: 0.9rem; font-family: 'DM Sans', sans-serif;
      font-weight: 500; cursor: pointer; transition: background 0.2s;
    }
    #add-btn:hover { background: #a33a0c; }
    #export-btn {
      background: rgba(255,255,255,0.15); color: #fdf6ee;
      border: 1px solid rgba(255,255,255,0.25); border-radius: 50px;
      padding: 7px 14px; font-size: 0.82rem; font-family: 'DM Sans', sans-serif;
      cursor: pointer; transition: background 0.2s;
    }
    #export-btn:hover { background: rgba(255,255,255,0.25); }
    #logout-btn {
      background: rgba(255,255,255,0.12); color: #fdf6ee; border: 1px solid rgba(255,255,255,0.2);
      border-radius: 50px; padding: 7px 14px; font-size: 0.82rem; font-family: 'DM Sans', sans-serif;
      cursor: pointer; transition: background 0.2s;
    }
    #logout-btn:hover { background: rgba(255,255,255,0.22); }

    /* ── CONTROLS ── */
    #controls {
      padding: 12px 16px; display: flex; gap: 10px;
      background: var(--bg); border-bottom: 1px solid var(--border);
    }
    #search {
      flex: 1; padding: 9px 14px; border: 1.5px solid var(--border); border-radius: 50px;
      font-family: 'DM Sans', sans-serif; font-size: 0.95rem; background: white; outline: none; color: var(--text);
    }
    #search:focus { border-color: var(--accent2); }
    #filter-status {
      padding: 9px 12px; border: 1.5px solid var(--border); border-radius: 50px;
      font-family: 'DM Sans', sans-serif; font-size: 0.88rem; background: white; color: var(--text); outline: none; cursor: pointer;
    }

    /* ── CAT GRID ── */
    #cat-list {
      padding: 16px; display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 14px;
    }
    .cat-card {
      background: var(--card); border-radius: 14px; overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07); cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s; border: 1px solid var(--border);
    }
    .cat-card:hover { transform: translateY(-3px); box-shadow: 0 6px 18px rgba(0,0,0,0.12); }
    .cat-card img { width: 100%; aspect-ratio: 1; object-fit: cover; display: block; background: var(--border); }
    .cat-card .no-photo {
      width: 100%; aspect-ratio: 1; background: linear-gradient(135deg, #f0e6da, #e8d5c4);
      display: flex; align-items: center; justify-content: center; font-size: 2.5rem;
    }
    .cat-card-info { padding: 10px 12px; }
    .cat-card-name {
      font-family: 'Playfair Display', serif; font-size: 1rem; font-weight: 700;
      margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .cat-card-ref { font-size: 0.72rem; color: var(--accent); font-weight: 500; margin-bottom: 3px; }
    .cat-card-sub { font-size: 0.78rem; color: var(--muted); margin-bottom: 6px; }
    .status-badge {
      display: inline-block; font-size: 0.7rem; font-weight: 500;
      padding: 2px 9px; border-radius: 50px; text-transform: uppercase; letter-spacing: 0.04em;
    }
    .status-Dostupná   { background: #d6f0e0; color: var(--available); }
    .status-Adoptována { background: #e8e8e8; color: var(--adopted); }
    .status-Pěstounská { background: #fde8c8; color: var(--foster); }
    .status-Léčení     { background: #fde0e0; color: var(--medical); }
    .status-Exitus     { background: #e0e0e0; color: #444; }
    .status-K\ adopci         { background: #d6f0e0; color: var(--available); }
    .status-Virtuální\ adopce  { background: #fde8c8; color: var(--foster); }
    .status-Našli\ domov      { background: #e8e8e8; color: var(--adopted); }
    .status-Opustili\ nás     { background: #e0e0e0; color: #444; }
    #loading { text-align: center; padding: 60px 20px; color: var(--muted); font-size: 1rem; }

    /* ── MODALS ── */
    .modal-overlay {
      display: none; position: fixed; inset: 0; background: rgba(42,31,20,0.55);
      z-index: 200; align-items: flex-end; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--bg); width: 100%; max-width: 560px; max-height: 94vh;
      border-radius: 24px 24px 0 0; overflow-y: auto; padding: 20px 18px 50px; animation: slideUp 0.3s ease;
    }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .modal-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 18px; }
    .modal > h2 { font-family: 'Playfair Display', serif; font-size: 1.4rem; margin-bottom: 18px; }
    .form-section {
      background: var(--section-bg); border-radius: 14px; padding: 14px;
      margin-bottom: 14px; border: 1px solid var(--border);
    }
    .form-section-title {
      font-size: 0.75rem; font-weight: 500; color: var(--accent); text-transform: uppercase;
      letter-spacing: 0.08em; margin-bottom: 12px; display: flex; align-items: center; gap: 6px;
    }
    .form-section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .form-group { margin-bottom: 12px; }
    .form-group:last-child { margin-bottom: 0; }
    .form-group label {
      display: block; font-size: 0.78rem; font-weight: 500; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px;
    }
    .form-group input, .form-group select, .form-group textarea {
      width: 100%; padding: 9px 12px; border: 1.5px solid var(--border); border-radius: 10px;
      font-family: 'DM Sans', sans-serif; font-size: 0.93rem; background: white;
      color: var(--text); outline: none; transition: border-color 0.2s;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--accent2); }
    .form-group textarea { resize: vertical; min-height: 70px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .photo-upload-area {
      border: 2px dashed var(--border); border-radius: 12px; padding: 18px;
      text-align: center; cursor: pointer; transition: border-color 0.2s, background 0.2s; position: relative;
    }
    .photo-upload-area:hover { border-color: var(--accent2); background: #fdf0e8; }
    .photo-upload-area input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
    .photo-upload-area .upload-icon { font-size: 1.8rem; margin-bottom: 4px; }
    .photo-upload-area p { font-size: 0.83rem; color: var(--muted); }
    #photo-preview { width: 100%; max-height: 180px; object-fit: cover; border-radius: 10px; margin-top: 10px; display: none; }
    #upload-progress { font-size: 0.82rem; color: var(--muted); margin-top: 6px; display: none; }
    .btn-row { display: flex; gap: 10px; margin-top: 20px; }
    .btn-primary {
      flex: 1; background: var(--accent); color: white; border: none; border-radius: 50px;
      padding: 13px; font-size: 0.97rem; font-family: 'DM Sans', sans-serif; font-weight: 500;
      cursor: pointer; transition: background 0.2s;
    }
    .btn-primary:hover { background: #a33a0c; }
    .btn-primary:disabled { background: #ccc; cursor: not-allowed; }
    .btn-secondary {
      flex: 1; background: transparent; color: var(--text); border: 1.5px solid var(--border);
      border-radius: 50px; padding: 13px; font-size: 0.97rem; font-family: 'DM Sans', sans-serif;
      cursor: pointer; transition: background 0.2s;
    }
    .btn-secondary:hover { background: var(--border); }
    .btn-danger {
      background: #fde0e0; color: var(--medical); border: none; border-radius: 50px;
      padding: 13px 18px; font-size: 0.97rem; font-family: 'DM Sans', sans-serif; cursor: pointer;
    }
    .btn-print {
      background: #e8f0fe; color: #1a56db; border: none; border-radius: 50px;
      padding: 13px 18px; font-size: 0.97rem; font-family: 'DM Sans', sans-serif; cursor: pointer;
    }

    /* ── DETAIL VIEW ── */
    #detail-photo { width: 100%; max-height: 240px; object-fit: cover; border-radius: 14px; margin-bottom: 14px; display: none; }
    .detail-no-photo {
      width: 100%; height: 140px; background: linear-gradient(135deg, #f0e6da, #e8d5c4);
      border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 3.5rem; margin-bottom: 14px;
    }
    .detail-header { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
    .detail-name { font-family: 'Playfair Display', serif; font-size: 1.7rem; }
    .detail-section { margin-bottom: 12px; }
    .detail-section-title {
      font-size: 0.72rem; font-weight: 500; color: var(--accent); text-transform: uppercase;
      letter-spacing: 0.08em; margin-bottom: 8px; padding-bottom: 4px; border-bottom: 1px solid var(--border);
    }
    .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .detail-field { background: white; border-radius: 10px; padding: 9px 12px; border: 1px solid var(--border); }
    .detail-field.full { grid-column: 1 / -1; }
    .detail-field .label { font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 2px; }
    .detail-field .value { font-size: 0.92rem; font-weight: 500; white-space: pre-wrap; line-height: 1.4; }

    /* ── TOAST ── */
    #toast {
      position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px);
      background: var(--text); color: white; padding: 10px 22px; border-radius: 50px;
      font-size: 0.9rem; z-index: 999; transition: transform 0.3s; white-space: nowrap;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }

    /* ── PRINT ── */
    @media print {
      body * { visibility: hidden; }
      #print-area, #print-area * { visibility: visible; }
      #print-area {
        position: fixed; inset: 0; background: white;
        padding: 15mm; font-family: Arial, sans-serif; font-size: 10pt; color: #000;
      }
      .print-title { font-size: 14pt; font-weight: bold; text-align: center; border: 2px solid #000; padding: 6px; margin-bottom: 10px; letter-spacing: 1px; }
      .print-por { text-align: right; font-size: 9pt; margin-bottom: 8px; }
      .print-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0; border: 1px solid #000; margin-bottom: 8px; }
      .print-cell { border: 1px solid #000; padding: 4px 6px; min-height: 22px; }
      .print-cell.full { grid-column: 1 / -1; }
      .print-cell .plabel { font-size: 7.5pt; color: #555; text-transform: uppercase; letter-spacing: 0.05em; }
      .print-cell .pvalue { font-size: 9.5pt; font-weight: bold; min-height: 14px; }
      .print-photo { text-align: center; padding: 4px; }
      .print-photo img { max-width: 100%; max-height: 120px; object-fit: cover; }
      .print-photo .no-photo-placeholder { height: 120px; background: #f0f0f0; display: flex; align-items: center; justify-content: center; font-size: 18pt; }
      .print-signatures { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 12px; }
      .print-sig-box { border-top: 1px solid #000; padding-top: 4px; font-size: 8pt; }
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="paw">🐾</div>
  <h2>Evidence koček</h2>
  <p class="subtitle">Přihlaste se pro přístup k databázi</p>
  <div class="login-box">
    <input type="email" id="login-email" placeholder="E-mailová adresa"
      onkeydown="if(event.key==='Enter')document.getElementById('login-password').focus()" />
    <input type="password" id="login-password" placeholder="Heslo"
      onkeydown="if(event.key==='Enter')signIn()" />
    <button class="btn-primary" onclick="signIn()" id="signin-btn">Přihlásit se</button>
    <div id="login-error"></div>
    <div id="login-success"></div>
    <button id="forgot-link" onclick="showForgotPassword()">Zapomenuté heslo?</button>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none">
  <header>
    <h1>🐾 <span>Evidence</span> koček</h1>
    <h2>pro Kočičí domov Sissi</h2>
    <div class="header-actions">
      <button id="add-btn" onclick="openAddModal()">+ Přidat kočku</button>
      <button id="export-btn" onclick="exportToXlsx()">⬇ Export</button>
      <button id="logout-btn" onclick="signOut()">Odhlásit</button>
    </div>
  </header>
  <div id="controls">
    <input type="text" id="search" placeholder="Hledat podle jména, barvy, místa…" oninput="renderCats()" />
    <select id="filter-status" onchange="renderCats()">
      <option value="">Vše</option>
      <option value="K adopci">K adopci</option>
      <option value="Virtuální adopce">Virtuální adopce</option>
      <option value="Našli domov">Našli domov</option>
      <option value="Opustili nás">Opustili nás</option>
    </select>
  </div>
  <div id="loading">Načítám záznamy… 🐱</div>
  <div id="cat-list" style="display:none"></div>
</div>

<!-- ADD/EDIT MODAL -->
<div class="modal-overlay" id="form-modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2 id="form-title">Přidat kočku</h2>
    <div class="form-section">
      <div class="form-section-title">Základní informace</div>
      <div class="form-row">
        <div class="form-group">
          <label>Pořadové číslo</label>
          <input type="text" id="f-ref" placeholder="např. 001" />
        </div>
        <div class="form-group">
          <label>Jméno</label>
          <input type="text" id="f-name" placeholder="např. Míša" />
        </div>
        <div class="form-group">
          <label>Pohlaví</label>
          <select id="f-gender">
            <option value="">Neznámé</option>
            <option value="Kočka">Kočka</option>
            <option value="Kocour">Kocour</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Plemeno</label>
          <input type="text" id="f-breed" placeholder="např. kočka domácí" />
        </div>
        <div class="form-group">
          <label>Přibližné datum narození</label>
          <input type="text" id="f-birthdate" placeholder="např. jaro 2022" />
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Barva / zbarvení</label>
          <input type="text" id="f-color" placeholder="např. tříbarevná" />
        </div>
        <div class="form-group">
          <label>Váha</label>
          <input type="text" id="f-weight" placeholder="např. 3,5 kg" />
        </div>
      </div>
      <div class="form-group">
        <label>Zvláštní znamení</label>
        <input type="text" id="f-marks" placeholder="např. bílá skvrna na hrudi" />
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Číslo mikročipu</label>
          <input type="text" id="f-chip" placeholder="15místné číslo" />
        </div>
        <div class="form-group">
          <label>Tetování</label>
          <input type="text" id="f-tattoo" placeholder="kód tetování" />
        </div>
      </div>
    </div>
    <div class="form-section">
      <div class="form-section-title">Fotografie</div>
      <div class="photo-upload-area">
        <input type="file" id="f-photo" accept="image/*" onchange="previewPhoto(event)" />
        <div class="upload-icon">📷</div>
        <p>Klepněte pro výběr fotografie</p>
      </div>
      <img id="photo-preview" src="" alt="Náhled" />
      <div id="upload-progress">Nahrávám fotografii…</div>
    </div>
    <div class="form-section">
      <div class="form-section-title">Zdravotní záznamy</div>
      <div class="form-group">
        <label>Veterinární záznamy</label>
        <textarea id="f-medical" placeholder="Očkování, léčba, operace…"></textarea>
      </div>
      <div class="form-group">
        <label>Stav</label>
        <select id="f-status">
          <option value="K adopci">K adopci</option>
          <option value="Virtuální adopce">Virtuální adopce</option>
          <option value="Našli domov">Našli domov</option>
          <option value="Opustili nás">Opustili nás</option>
        </select>
      </div>
      <div class="form-group">
        <label>Ostatní poznámky</label>
        <textarea id="f-notes" placeholder="Povaha, speciální potřeby…"></textarea>
      </div>
    </div>
    <div class="form-section">
      <div class="form-section-title">Příjem kočky</div>
      <div class="form-row">
        <div class="form-group">
          <label>Datum nálezu / odchytu</label>
          <input type="date" id="f-found-date" />
        </div>
        <div class="form-group">
          <label>Datum přijmu</label>
          <input type="date" id="f-intake-date" />
        </div>
      </div>
      <div class="form-group">
        <label>Místo nálezu / odchytu</label>
        <input type="text" id="f-found-location" placeholder="ulice, město…" />
      </div>
      <div class="form-group">
        <label>Okolnosti nálezu / odchytu</label>
        <textarea id="f-found-circumstances" placeholder="Popis situace při nálezu nebo odchytu…"></textarea>
      </div>
      <div class="form-group">
        <label>Zdravotní stav při příjmu</label>
        <textarea id="f-health-intake" placeholder="Popis zdravotního stavu…"></textarea>
      </div>
      <div class="form-section-title" style="margin-top:10px">Nálezce</div>
      <div class="form-row">
        <div class="form-group">
          <label>Jméno nálezce</label>
          <input type="text" id="f-finder-name" placeholder="Jméno a příjmení" />
        </div>
        <div class="form-group">
          <label>Telefon</label>
          <input type="tel" id="f-finder-phone" placeholder="+420…" />
        </div>
      </div>
      <div class="form-group">
        <label>Adresa nálezce</label>
        <input type="text" id="f-finder-address" placeholder="Ulice, město, PSČ" />
      </div>
      <div class="form-group">
        <label>OP nálezce</label>
        <input type="text" id="f-finder-id" placeholder="číslo OP" />
      </div>
    </div>
    <div class="form-section">
      <div class="form-section-title">Výdej kočky</div>
      <div class="form-row">
        <div class="form-group">
          <label>Datum vydání</label>
          <input type="date" id="f-release-date" />
        </div>
        <div class="form-group">
          <label>Typ výdeje</label>
          <select id="f-release-type">
            <option value="">— nevydáno —</option>
            <option value="Adopce">Adopce</option>
            <option value="Vráceno majiteli">Vráceno majiteli</option>
            <option value="Exitus">Exitus</option>
            <option value="Jiné">Jiné</option>
          </select>
        </div>
      </div>

      </div>
      <div class="form-group">
        <label>Adresa</label>
        <input type="text" id="f-adopter-address" placeholder="Ulice, město, PSČ" />
      </div>
      <div class="form-group">
        <label>OP přejímající osoby</label>

</div>

<div id="print-area" style="display:none"></div>
<div id="toast"></div>

<script>
  const SUPABASE_URL = 'https://doupyarcgpzhffngvcsy.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_YlSN5YlqZkcpCZQ6GR29IQ_EjcGOhN2';
  let authToken = null;
  let currentUserEmail = null;
  let currentCatForPrint = null;

  // ── AUTH ──────────────────────────────────────────────────
  async function signIn() {
    const email = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;
    const btn = document.getElementById('signin-btn');
    if (!email || !password) { showLoginError('Zadejte e-mail a heslo.'); return; }
    btn.disabled = true; btn.textContent = 'Přihlašuji…'; hideLoginMessages();
    try {
      const res = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
        method: 'POST',
        headers: { 'apikey': SUPABASE_KEY, 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error_description || 'Přihlášení selhalo');
      authToken = data.access_token;
      currentUserEmail = data.user.email;
      localStorage.setItem('shelter_token', authToken);
      localStorage.setItem('shelter_email', currentUserEmail);
      showApp();
    } catch (e) {
      showLoginError(e.message.includes('Invalid') ? 'Nesprávný e-mail nebo heslo.' : e.message);
    } finally { btn.disabled = false; btn.textContent = 'Přihlásit se'; }
  }

  async function signOut() {
    try {
      await fetch(`${SUPABASE_URL}/auth/v1/logout`, {
        method: 'POST', headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${authToken}` }
      });
    } catch(e) {}
    authToken = null; currentUserEmail = null;
    localStorage.removeItem('shelter_token'); localStorage.removeItem('shelter_email');
    document.getElementById('app').style.display = 'none';
    const ls = document.getElementById('login-screen');
    ls.style.display = 'flex'; ls.style.flexDirection = 'column';
    document.getElementById('login-email').value = '';
    document.getElementById('login-password').value = '';
    hideLoginMessages();
  }

  async function showForgotPassword() {
    const email = document.getElementById('login-email').value.trim();
    if (!email) { showLoginError('Nejdříve zadejte svůj e-mail, pak klikněte na "Zapomenuté heslo".'); return; }
    hideLoginMessages();
    try {
      const res = await fetch(`${SUPABASE_URL}/auth/v1/recover`, {
        method: 'POST',
        headers: { 'apikey': SUPABASE_KEY, 'Content-Type': 'application/json' },
        body: JSON.stringify({ email })
      });
      if (!res.ok) throw new Error();
      showLoginSuccess(`E-mail pro obnovení hesla byl odeslán na ${email}.`);
    } catch(e) { showLoginError('Nepodařilo se odeslat e-mail. Zkontrolujte adresu a zkuste znovu.'); }
  }

  async function tryRestoreSession() {
    const saved = localStorage.getItem('shelter_token');
    if (!saved) return false;
    try {
      const res = await fetch(`${SUPABASE_URL}/auth/v1/user`, {
        headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${saved}` }
      });
      if (!res.ok) throw new Error();
      const user = await res.json();
      authToken = saved;
      currentUserEmail = user.email || localStorage.getItem('shelter_email');
      return true;
    } catch(e) { localStorage.removeItem('shelter_token'); return false; }
  }

  function showLoginError(msg) { const el = document.getElementById('login-error'); el.textContent = msg; el.style.display = 'block'; document.getElementById('login-success').style.display = 'none'; }
  function showLoginSuccess(msg) { const el = document.getElementById('login-success'); el.textContent = msg; el.style.display = 'block'; document.getElementById('login-error').style.display = 'none'; }
  function hideLoginMessages() { document.getElementById('login-error').style.display = 'none'; document.getElementById('login-success').style.display = 'none'; }
  function showApp() { document.getElementById('login-screen').style.display = 'none'; document.getElementById('app').style.display = 'block'; loadCats(); }

  // ── DATA ──────────────────────────────────────────────────
  async function sbFetch(path, options = {}) {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
      ...options,
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${authToken}`, 'Content-Type': 'application/json', 'Prefer': options.prefer || '', ...options.headers }
    });
    if (res.status === 401) { signOut(); throw new Error('Relace vypršela'); }
    return res;
  }
  async function getCats() { const res = await sbFetch('cats?select=*&order=created_at.desc'); if (!res.ok) throw new Error(); return res.json(); }
  async function insertCat(data) { const res = await sbFetch('cats', { method: 'POST', prefer: 'return=representation', body: JSON.stringify(data) }); if (!res.ok) throw new Error(); return (await res.json())[0]; }
  async function updateCat(id, data) { const res = await sbFetch(`cats?id=eq.${id}`, { method: 'PATCH', prefer: 'return=representation', body: JSON.stringify(data) }); if (!res.ok) throw new Error(); }
  async function deleteCat(id) { const res = await sbFetch(`cats?id=eq.${id}`, { method: 'DELETE' }); if (!res.ok) throw new Error(); }
  async function uploadPhoto(file, catId) {
    const ext = file.name.split('.').pop();
    const path = `${catId}.${ext}`;
    const res = await fetch(`${SUPABASE_URL}/storage/v1/object/cat-photos/${path}`, {
      method: 'POST',
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${authToken}`, 'Content-Type': file.type, 'x-upsert': 'true' },
      body: file
    });
    if (!res.ok) throw new Error('Nahrání fotografie selhalo');
    return `${SUPABASE_URL}/storage/v1/object/public/cat-photos/${path}`;
  }

  // ── STATE ─────────────────────────────────────────────────
  let allCats = [], editingId = null, photoFile = null;

  async function loadCats() {
    document.getElementById('loading').style.display = 'block';
    document.getElementById('cat-list').style.display = 'none';
    try { allCats = await getCats(); renderCats(); }
    catch(e) { document.getElementById('loading').textContent = '⚠️ Nepodařilo se načíst záznamy. Zkontrolujte připojení.'; }
  }

  function renderCats() {
    const search = document.getElementById('search').value.toLowerCase();
    const statusFilter = document.getElementById('filter-status').value;
    const cats = allCats.filter(c => {
      const matchSearch = !search ||
        (c.name||'').toLowerCase().includes(search) ||
        (c.color||'').toLowerCase().includes(search) ||
        (c.found_location||'').toLowerCase().includes(search) ||
        (c.ref_number||'').toLowerCase().includes(search);
      return matchSearch && (!statusFilter || c.adoption_status === statusFilter);
    });
    document.getElementById('loading').style.display = 'none';
    const list = document.getElementById('cat-list');
    list.style.display = 'grid'; list.innerHTML = '';
    if (cats.length === 0) {
      list.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--muted)"><div style="font-size:3rem;margin-bottom:12px">🐾</div><div>Žádné záznamy nenalezeny</div></div>`;
      return;
    }
    cats.forEach(cat => {
      const card = document.createElement('div');
      card.className = 'cat-card'; card.onclick = () => openDetail(cat);
      const status = cat.adoption_status || 'K adopci';
      const sub = [cat.gender, cat.color].filter(Boolean).join(' · ') || 'Bez podrobností';
      const refHtml = cat.ref_number ? `<div class="cat-card-ref"># ${cat.ref_number}</div>` : '';
      card.innerHTML = `${cat.photo_url ? `<img src="${cat.photo_url}" alt="${cat.name||'Kočka'}" loading="lazy"/>` : `<div class="no-photo">🐱</div>`}
        <div class="cat-card-info">
          <div class="cat-card-name">${cat.name || 'Bez jména'}</div>
          ${refHtml}
          <div class="cat-card-sub">${sub}</div>
          <span class="status-badge status-${status}">${status}</span>
        </div>`;
      list.appendChild(card);
    });
  }

  // ── EXPORT DO EXCELU ──────────────────────────────────────
  function exportToXlsx() {
    if (!allCats.length) { showToast('Žádné záznamy k exportu.'); return; }

    const fmtDate = d => d ? new Date(d).toLocaleDateString('cs-CZ') : '';

    // Definice sloupců: [záhlaví, funkce pro získání hodnoty]
    const columns = [
      ['Pořadové číslo',        c => c.ref_number || ''],
      ['Jméno',                 c => c.name || ''],
      ['Pohlaví',               c => c.gender || ''],
      ['Plemeno',               c => c.breed || ''],
      ['Přibl. datum narození', c => c.approximate_age || ''],
      ['Barva / zbarvení',      c => c.color || ''],
      ['Váha',                  c => c.weight || ''],
      ['Zvláštní znamení',      c => c.special_marks || ''],
      ['Číslo mikročipu',       c => c.microchip || ''],
      ['Tetování',              c => c.tattoo || ''],
      ['Stav',                  c => c.adoption_status || ''],
      ['Veterinární záznamy',   c => c.medical_notes || ''],
      ['Ostatní poznámky',      c => c.other_notes || ''],
      ['Datum nálezu/odchytu',  c => fmtDate(c.found_date)],
      ['Datum přijmu',          c => fmtDate(c.intake_date)],
      ['Místo nálezu/odchytu',  c => c.found_location || ''],
      ['Okolnosti nálezu',      c => c.found_circumstances || ''],
      ['Zdravotní stav při příjmu', c => c.health_at_intake || ''],
      ['Jméno nálezce',         c => c.finder_name || ''],
      ['Telefon nálezce',       c => c.finder_phone || ''],
      ['Adresa nálezce',        c => c.finder_address || ''],
      ['OP nálezce',            c => c.finder_id_number || ''],
      ['Datum vydání',          c => fmtDate(c.release_date)],
      ['Typ výdeje',            c => c.release_type || ''],
      ['Umístění',              c => c.placement || ''],
      ['Jméno přejímající osoby', c => c.adopter_name || ''],
      ['Telefon přejímající osoby', c => c.adopter_phone || ''],
      ['Adresa přejímající osoby', c => c.adopter_address || ''],
      ['OP přejímající osoby',  c => c.adopter_id_number || ''],
      ['Záznam vytvořil/a',     c => c.created_by || ''],
      ['Naposledy upravil/a',   c => c.updated_by || ''],
      ['Datum vytvoření',       c => fmtDate(c.created_at)],
    ];

    // Sestavení dat: záhlaví + řádky
    const wsData = [
      columns.map(([header]) => header),
      ...allCats.map(cat => columns.map(([, fn]) => fn(cat)))
    ];

    const wb = XLSX.utils.book_new();
    const ws = XLSX.utils.aoa_to_sheet(wsData);

    // Šířky sloupců
    ws['!cols'] = columns.map(([header]) => ({
      wch: Math.max(header.length + 2, 14)
    }));

    // Tučné záhlaví
    const headerRange = XLSX.utils.decode_range(ws['!ref']);
    for (let col = headerRange.s.c; col <= headerRange.e.c; col++) {
      const cell = ws[XLSX.utils.encode_cell({ r: 0, c: col })];
      if (cell) cell.s = { font: { bold: true } };
    }

    // Název listu a datum exportu v názvu souboru
    XLSX.utils.book_append_sheet(wb, ws, 'Evidence koček');
    const dnes = new Date().toISOString().slice(0, 10);
    XLSX.writeFile(wb, `evidence-kocek-${dnes}.xlsx`);
    showToast(`Exportováno ${allCats.length} záznamů ✓`);
  }

  // ── FORM ──────────────────────────────────────────────────
  const FIELDS = ['f-name','f-gender','f-breed','f-birthdate','f-color','f-weight','f-marks','f-chip','f-tattoo','f-ref',
    'f-found-date','f-intake-date','f-found-location','f-found-circumstances','f-health-intake',
    'f-finder-name','f-finder-phone','f-finder-address','f-finder-id',
    'f-medical','f-status','f-notes',
    'f-release-date','f-release-type','f-placement','f-adopter-name','f-adopter-phone','f-adopter-address','f-adopter-id'];

  function openAddModal() {
    editingId = null; photoFile = null;
    document.getElementById('form-title').textContent = 'Přidat kočku';
    document.getElementById('save-btn').textContent = 'Uložit';
    clearForm(); document.getElementById('form-modal').classList.add('open');
  }

  function openEditModal(cat) {
    editingId = cat.id; photoFile = null;
    document.getElementById('form-title').textContent = 'Upravit záznam';
    document.getElementById('save-btn').textContent = 'Uložit změny';
    const map = {
      'f-name': cat.name, 'f-gender': cat.gender, 'f-breed': cat.breed,
      'f-birthdate': cat.approximate_age, 'f-color': cat.color, 'f-weight': cat.weight,
      'f-marks': cat.special_marks, 'f-chip': cat.microchip, 'f-tattoo': cat.tattoo, 'f-ref': cat.ref_number,
      'f-found-date': cat.found_date, 'f-intake-date': cat.intake_date,
      'f-found-location': cat.found_location, 'f-found-circumstances': cat.found_circumstances,
      'f-health-intake': cat.health_at_intake, 'f-finder-name': cat.finder_name,
      'f-finder-phone': cat.finder_phone, 'f-finder-address': cat.finder_address, 'f-finder-id': cat.finder_id_number,
      'f-medical': cat.medical_notes, 'f-status': cat.adoption_status, 'f-notes': cat.other_notes,
      'f-release-date': cat.release_date, 'f-release-type': cat.release_type, 'f-placement': cat.placement,
      'f-adopter-name': cat.adopter_name, 'f-adopter-phone': cat.adopter_phone,
      'f-adopter-address': cat.adopter_address, 'f-adopter-id': cat.adopter_id_number
    };
    Object.entries(map).forEach(([id, val]) => { const el = document.getElementById(id); if (el) el.value = val || ''; });
    const preview = document.getElementById('photo-preview');
    if (cat.photo_url) { preview.src = cat.photo_url; preview.style.display = 'block'; } else { preview.style.display = 'none'; }
    document.getElementById('detail-modal').classList.remove('open');
    document.getElementById('form-modal').classList.add('open');
  }

  function closeFormModal() { document.getElementById('form-modal').classList.remove('open'); clearForm(); }

  function clearForm() {
    FIELDS.forEach(id => { const el = document.getElementById(id); if (el) el.value = el.tagName === 'SELECT' ? el.options[0].value : ''; });
    document.getElementById('f-status').value = 'K adopci';
    document.getElementById('photo-preview').style.display = 'none';
    document.getElementById('photo-preview').src = '';
    document.getElementById('f-photo').value = '';
    photoFile = null;
  }

  function previewPhoto(e) {
    const file = e.target.files[0]; if (!file) return; photoFile = file;
    const reader = new FileReader();
    reader.onload = ev => { const p = document.getElementById('photo-preview'); p.src = ev.target.result; p.style.display = 'block'; };
    reader.readAsDataURL(file);
  }

  function getVal(id) { const el = document.getElementById(id); return el ? el.value.trim() || null : null; }

  async function saveCat() {
    const btn = document.getElementById('save-btn'); btn.disabled = true; btn.textContent = 'Ukládám…';
    const data = {
      name: getVal('f-name'), gender: getVal('f-gender'), breed: getVal('f-breed'),
      approximate_age: getVal('f-birthdate'), color: getVal('f-color'), weight: getVal('f-weight'),
      special_marks: getVal('f-marks'), microchip: getVal('f-chip'), tattoo: getVal('f-tattoo'),
      ref_number: getVal('f-ref'), found_date: getVal('f-found-date'), intake_date: getVal('f-intake-date'),
      found_location: getVal('f-found-location'), found_circumstances: getVal('f-found-circumstances'),
      health_at_intake: getVal('f-health-intake'), finder_name: getVal('f-finder-name'),
      finder_phone: getVal('f-finder-phone'), finder_address: getVal('f-finder-address'),
      finder_id_number: getVal('f-finder-id'), medical_notes: getVal('f-medical'),
      adoption_status: getVal('f-status'), other_notes: getVal('f-notes'),
      release_date: getVal('f-release-date'), release_type: getVal('f-release-type'),
      placement: getVal('f-placement'), adopter_name: getVal('f-adopter-name'),
      adopter_phone: getVal('f-adopter-phone'), adopter_address: getVal('f-adopter-address'),
      adopter_id_number: getVal('f-adopter-id'),
      updated_by: currentUserEmail,
      ...(editingId ? {} : { created_by: currentUserEmail })
    };
    try {
      let catId = editingId;
      if (!editingId) { const newCat = await insertCat(data); catId = newCat.id; }
      else { await updateCat(editingId, data); }
      if (photoFile && catId) {
        document.getElementById('upload-progress').style.display = 'block';
        const url = await uploadPhoto(photoFile, catId);
        await updateCat(catId, { photo_url: url });
      }
      closeFormModal(); showToast(editingId ? 'Záznam upraven! 🐾' : 'Kočka přidána! 🐾'); await loadCats();
    } catch(e) { showToast('Něco se pokazilo. Zkuste to prosím znovu.'); }
    finally { btn.disabled = false; btn.textContent = editingId ? 'Uložit změny' : 'Uložit'; document.getElementById('upload-progress').style.display = 'none'; }
  }

  // ── DETAIL ────────────────────────────────────────────────
  function openDetail(cat) {
    currentCatForPrint = cat;
    const photo = document.getElementById('detail-photo'), noPhoto = document.getElementById('detail-no-photo');
    if (cat.photo_url) { photo.src = cat.photo_url; photo.style.display = 'block'; noPhoto.style.display = 'none'; }
    else { photo.style.display = 'none'; noPhoto.style.display = 'flex'; }
    document.getElementById('detail-name').textContent = cat.name || 'Bez jména';
    document.getElementById('detail-ref').textContent = cat.ref_number ? `Pořadové číslo: ${cat.ref_number}` : '';
    const badge = document.getElementById('detail-status-badge');
    badge.textContent = cat.adoption_status || 'K adopci';
    badge.className = `status-badge status-${cat.adoption_status || 'K adopci'}`;
    const body = document.getElementById('detail-body');
    body.innerHTML = '';
    function section(title, fields) {
      const visible = fields.filter(f => f.value);
      if (visible.length === 0) return;
      const sec = document.createElement('div'); sec.className = 'detail-section';
      sec.innerHTML = `<div class="detail-section-title">${title}</div><div class="detail-grid"></div>`;
      const grid = sec.querySelector('.detail-grid');
      visible.forEach(f => {
        const el = document.createElement('div');
        el.className = 'detail-field' + (f.full ? ' full' : '');
        el.innerHTML = `<div class="label">${f.label}</div><div class="value">${f.value}</div>`;
        grid.appendChild(el);
      });
      body.appendChild(sec);
    }
    const fmtDate = d => d ? new Date(d).toLocaleDateString('cs-CZ') : null;
    section('Popis kočky', [
      { label: 'Pohlaví', value: cat.gender },
      { label: 'Plemeno', value: cat.breed },
      { label: 'Přibl. datum narození', value: cat.approximate_age },
      { label: 'Barva / zbarvení', value: cat.color },
      { label: 'Váha', value: cat.weight },
      { label: 'Zvláštní znamení', value: cat.special_marks, full: true },
      { label: 'Číslo mikročipu', value: cat.microchip },
      { label: 'Tetování', value: cat.tattoo },
    ]);
    section('Příjem kočky', [
      { label: 'Datum nálezu / odchytu', value: fmtDate(cat.found_date) },
      { label: 'Datum přijmu', value: fmtDate(cat.intake_date) },
      { label: 'Místo nálezu / odchytu', value: cat.found_location, full: true },
      { label: 'Okolnosti nálezu', value: cat.found_circumstances, full: true },
      { label: 'Zdravotní stav při příjmu', value: cat.health_at_intake, full: true },
    ]);
    section('Nálezce', [
      { label: 'Jméno', value: cat.finder_name },
      { label: 'Telefon', value: cat.finder_phone },
      { label: 'Adresa', value: cat.finder_address, full: true },
      { label: 'OP', value: cat.finder_id_number },
    ]);
    section('Zdravotní záznamy', [
      { label: 'Záznamy', value: cat.medical_notes, full: true },
      { label: 'Ostatní poznámky', value: cat.other_notes, full: true },
    ]);
    section('Výdej kočky', [
      { label: 'Datum vydání', value: fmtDate(cat.release_date) },
      { label: 'Typ výdeje', value: cat.release_type },
      { label: 'Umístění', value: cat.placement, full: true },
    ]);
    section('Přejímající osoba', [
      { label: 'Jméno', value: cat.adopter_name },
      { label: 'Telefon', value: cat.adopter_phone },
      { label: 'Adresa', value: cat.adopter_address, full: true },
      { label: 'OP', value: cat.adopter_id_number },
    ]);
    const auditFields = [
      { label: 'Záznam vytvořil/a', value: cat.created_by },
      { label: 'Naposledy upravil/a', value: cat.updated_by },
      { label: 'Datum vytvoření', value: fmtDate(cat.created_at) },
    ].filter(f => f.value);
    if (auditFields.length > 0) section('Historie záznamu', auditFields);
    document.getElementById('edit-btn').onclick = () => openEditModal(cat);
    document.getElementById('delete-btn').onclick = () => confirmDelete(cat);
    document.getElementById('detail-modal').classList.add('open');
  }

  async function replacePhoto(e) {
    const file = e.target.files[0];
    if (!file || !currentCatForPrint) return;
    const status = document.getElementById('replace-photo-status');
    status.textContent = 'Nahrávám…'; status.style.display = 'inline';
    try {
      const url = await uploadPhoto(file, currentCatForPrint.id);
      await updateCat(currentCatForPrint.id, { photo_url: url, updated_by: currentUserEmail });
      currentCatForPrint.photo_url = url;
      const photo = document.getElementById('detail-photo');
      const noPhoto = document.getElementById('detail-no-photo');
      photo.src = url; photo.style.display = 'block'; noPhoto.style.display = 'none';
      status.textContent = 'Fotografie aktualizována ✓';
      await loadCats();
      setTimeout(() => { status.style.display = 'none'; }, 3000);
    } catch(e) {
      status.textContent = 'Nahrání selhalo.';
      setTimeout(() => { status.style.display = 'none'; }, 3000);
    }
    document.getElementById('replace-photo-input').value = '';
  }

  function closeDetailModal() { document.getElementById('detail-modal').classList.remove('open'); }

  async function confirmDelete(cat) {
    if (!confirm(`Opravdu chcete smazat záznam o kočce "${cat.name || 'bez jména'}"? Tuto akci nelze vrátit.`)) return;
    try { await deleteCat(cat.id); closeDetailModal(); showToast('Záznam smazán.'); await loadCats(); }
    catch(e) { showToast('Smazání selhalo. Zkuste to prosím znovu.'); }
  }

  // ── PRINT ─────────────────────────────────────────────────
  function printCard() {
    const cat = currentCatForPrint;
    if (!cat) return;
    const fmtDate = d => d ? new Date(d).toLocaleDateString('cs-CZ') : '—';
    const v = val => val || '—';
    const printArea = document.getElementById('print-area');
    printArea.style.display = 'block';
    printArea.innerHTML = `
      <div class="print-title">EVIDENČNÍ KARTA KOČKY</div>
      <div class="print-por">POR. ČÍSLO: <strong>${v(cat.ref_number)}</strong> &nbsp;&nbsp; JMÉNO: <strong>${v(cat.name)}</strong></div>
      <div class="print-grid">
        <div class="print-cell" style="grid-column:1/-1;background:#f5f5f5"><strong>POPIS KOČKY</strong></div>
        <div class="print-cell print-photo" style="grid-row: span 5">
          ${cat.photo_url ? `<img src="${cat.photo_url}" alt="foto"/>` : `<div class="no-photo-placeholder">🐱</div>`}
        </div>
        <div class="print-cell"><div class="plabel">Pohlaví</div><div class="pvalue">${v(cat.gender)}</div></div>
        <div class="print-cell"><div class="plabel">Plemeno</div><div class="pvalue">${v(cat.breed)}</div></div>
        <div class="print-cell"><div class="plabel">Přibl. datum narození</div><div class="pvalue">${v(cat.approximate_age)}</div></div>
        <div class="print-cell"><div class="plabel">Barva</div><div class="pvalue">${v(cat.color)}</div></div>
        <div class="print-cell"><div class="plabel">Váha</div><div class="pvalue">${v(cat.weight)}</div></div>
        <div class="print-cell full"><div class="plabel">Zvláštní znamení</div><div class="pvalue">${v(cat.special_marks)}</div></div>
        <div class="print-cell"><div class="plabel">Číslo mikročipu</div><div class="pvalue">${v(cat.microchip)}</div></div>
        <div class="print-cell"><div class="plabel">Tetování</div><div class="pvalue">${v(cat.tattoo)}</div></div>
        <div class="print-cell" style="grid-column:1/-1;background:#f5f5f5"><strong>PŘÍJEM KOČKY</strong></div>
        <div class="print-cell"><div class="plabel">Datum nálezu / odchytu</div><div class="pvalue">${fmtDate(cat.found_date)}</div></div>
        <div class="print-cell"><div class="plabel">Datum přijmu</div><div class="pvalue">${fmtDate(cat.intake_date)}</div></div>
        <div class="print-cell full"><div class="plabel">Místo nálezu / odchytu</div><div class="pvalue">${v(cat.found_location)}</div></div>
        <div class="print-cell full"><div class="plabel">Okolnosti nálezu / odchytu</div><div class="pvalue">${v(cat.found_circumstances)}</div></div>
        <div class="print-cell full"><div class="plabel">Zdravotní stav při příjmu</div><div class="pvalue">${v(cat.health_at_intake)}</div></div>
        <div class="print-cell"><div class="plabel">Jméno nálezce</div><div class="pvalue">${v(cat.finder_name)}</div></div>
        <div class="print-cell"><div class="plabel">Telefon nálezce</div><div class="pvalue">${v(cat.finder_phone)}</div></div>
        <div class="print-cell full"><div class="plabel">Adresa nálezce</div><div class="pvalue">${v(cat.finder_address)}</div></div>
        <div class="print-cell"><div class="plabel">OP nálezce</div><div class="pvalue">${v(cat.finder_id_number)}</div></div>
        <div class="print-cell"><div class="plabel">Zdravotní záznamy</div><div class="pvalue">${v(cat.medical_notes)}</div></div>
        <div class="print-cell" style="grid-column:1/-1;background:#f5f5f5"><strong>VÝDEJ KOČKY</strong></div>
        <div class="print-cell"><div class="plabel">Datum vydání</div><div class="pvalue">${fmtDate(cat.release_date)}</div></div>
        <div class="print-cell"><div class="plabel">Typ výdeje</div><div class="pvalue">${v(cat.release_type)}</div></div>
        <div class="print-cell full"><div class="plabel">Umístění kočky</div><div class="pvalue">${v(cat.placement)}</div></div>
        <div class="print-cell"><div class="plabel">Jméno přejímající osoby</div><div class="pvalue">${v(cat.adopter_name)}</div></div>
        <div class="print-cell"><div class="plabel">Telefon</div><div class="pvalue">${v(cat.adopter_phone)}</div></div>
        <div class="print-cell full"><div class="plabel">Adresa přejímající osoby</div><div class="pvalue">${v(cat.adopter_address)}</div></div>
        <div class="print-cell"><div class="plabel">OP přejímající osoby</div><div class="pvalue">${v(cat.adopter_id_number)}</div></div>
      </div>
      <div class="print-signatures">
        <div class="print-sig-box">KOČKU PŘEDAL/A:<br><br>${v(cat.finder_name)}<br><br>Podpis: ___________________________</div>
        <div class="print-sig-box">KOČKU PŘEVZAL/A:<br><br>${v(cat.adopter_name)}<br><br>Podpis: ___________________________</div>
      </div>`;
    window.print();
    setTimeout(() => { printArea.style.display = 'none'; }, 1000);
  }

  // ── TOAST ─────────────────────────────────────────────────
  function showToast(msg) {
    const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2800);
  }

  document.querySelectorAll('.modal-overlay').forEach(o => {
    o.addEventListener('click', e => { if (e.target === o) o.classList.remove('open'); });
  });

  // ── INIT ──────────────────────────────────────────────────
  (async () => {
    const valid = await tryRestoreSession();
    if (valid) { showApp(); }
    else { const ls = document.getElementById('login-screen'); ls.style.display = 'flex'; ls.style.flexDirection = 'column'; }
  })();
</script>
</body>
</html>
